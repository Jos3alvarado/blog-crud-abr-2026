{% extends "_base.html" %}

{% block content %}
    <h2>Eliminar Artículo</h2>
    <p>¿Estás seguro de que quieres eliminar el artículo "{{ article.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'article-detail' article.pk %}">Cancelar</a>
    </form>
{% endblock %}
